<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Story Motion Kit · Scene Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%;
        overflow: hidden; background: #080c18;
      }
      body { font-family: "Outfit", system-ui, sans-serif; }

  </head>
  <body>
    <div
      id="root"
      class="story-stage"
      data-composition-id="studio-preview"
      data-start="0"
      data-width="1920"
      data-height="1080"
    ></div>

    <script src="/hyperframes/story-motion-kit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hyperframes/core/dist/hyperframe.runtime.iife.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

        {
          name: "Title + countdown",
          preset: "title",
          opts: {
            eyebrow: "Scene preset library",

            backdrop: "sunset",

            backdrop: "sunset",

        {
          name: "Zoom punch",

            caption: "nunca parpadean primero",
            cx: 960,
            cy: 520,
            gap: 200,
            backdrop: "storm",

            backdrop: "mono",

          name: "Soft rain",

        {

          preset: "glassShatter",

            sfx: "¡CRASH!",
            sfxColor: "#e8f4ff",
            triggerAt: 1.8,
            crackX: 50,
            crackY: 45,
            backdrop: "mono",
          },
        },
        {
          name: "Explosion",
          preset: "explosion",
          opts: {
            image: IMG("shonen-anime"),
            sfx: "¡BOOOM!",
            sfxColor: "#ffb347",
            burstColor: "rgba(255, 160, 60, 0.9)",
            triggerAt: 1.2,
            backdrop: "mono",
          },
        },
        {
          name: "Fire glow",
          preset: "fireGlow",
          opts: {
            image: IMG("studio-ghibli-pastoral"),
            caption: "el fuego aún recordaba la casa.",
            backdrop: "storm",
          },
        },
        {
          name: "Snowfall",
          preset: "snowfall",
          opts: {
            image: IMG("arctic-minimal"),
            caption: "y la nieve lo cubrió todo — incluso lo que no queríamos olvidar.",
            backdrop: "melancholy",
          },
        },
        {
          name: "Neon pulse",
          preset: "neonPulse",
          opts: {
            image: IMG("neon-cyberpunk"),
            sign: "MOTEL",
            signColor: "#ff4fc1",
            neonColor: "rgba(255, 60, 180, 0.55)",
            backdrop: "cyber",
          },
        },
        {
          name: "Heat haze",
          preset: "heatHaze",
          opts: {
            image: IMG("sunlit-watercolor"),
            caption: "el calor doblaba el aire.",
            backdrop: "sunset",
          },
        },
        {
          name: "Underwater",
          preset: "underwater",
          opts: {
            image: IMG("studio-ghibli-pastoral"),
            caption: "y todo sonaba lejos, como bajo el mar.",
            backdrop: "storm",
          },
        },
        {
          name: "Confetti",
          preset: "confetti",
          opts: {
            image: IMG("pixar-style-3d"),
            sfx: "¡LO LOGRÓ!",
            sfxColor: "#ffd36a",
            backdrop: "sunset",
          },
        },
        {
          name: "Portal",
          preset: "portal",

            sfx: "¡ZWAARP!",
            portalColor: "rgba(140, 220, 255, 0.8)",
            backdrop: "cyber",
          },
        },
        {
          name: "Light flicker",
          preset: "lightFlicker",
          opts: {
            image: IMG("graphic-noir"),
            caption: "la luz sabía algo que nosotros no.",
            backdrop: "storm",
          },
        },
        {
          name: "Chase cam",
          preset: "chaseCam",
          opts: {
            image: IMG("shonen-anime"),
            sfx: "¡CORRE!",
            sfxColor: "#ff7a59",
            backdrop: "mono",
          },

            sfx: "¡WHOOOSH!",

            backdrop: "storm",
          },
        },
        {
          name: "Tempest",
          preset: "tempest",
          opts: {
            image: IMG("graphic-noir"),
            caption: "la tormenta sabía nuestros nombres.",
            strikes: [1.1, 2.4, 3.7],

          },
        },
        {

          preset: "sandstorm",

            image: IMG("western-comic"),

        {

          preset: "earthquake",
          opts: {

            sfx: "¡GRRROOOM!",
            sfxColor: "#c8c0b0",
            crackAt: 1.6,
            backdrop: "mono",
          },
        },
        {
          name: "Fog roll",
          preset: "fogRoll",
          opts: {
            image: IMG("sunlit-watercolor"),
            caption: "la niebla llegó primero, después las preguntas.",
            backdrop: "melancholy",
          },
        },
        {
          name: "Aurora",
          preset: "aurora",
          opts: {
            image: IMG("arctic-minimal"),
            caption: "el cielo encendió su lenguaje silencioso.",
            auroraColor1: "rgba(100, 255, 180, 0.7)",
            auroraColor2: "rgba(130, 120, 255, 0.55)",
            backdrop: "night",
          },
        },
        {
          name: "Falling leaves",
          preset: "fallingLeaves",
          opts: {
            image: IMG("impressionist-oil"),
            caption: "otra vez octubre, otra vez tú.",
            backdrop: "sunset",
          },
        },
        {
          name: "Meteor",
          preset: "meteor",
          opts: {
            image: IMG("neon-cyberpunk"),
            sfx: "¡IMPACTO!",
            sfxColor: "#ffc56b",
            impactAt: 1.5,
            impactX: 700,
            impactY: 700,
            backdrop: "night",
          },
        },
        {
          name: "Eclipse",
          preset: "eclipse",
          opts: {
            image: IMG("ukiyo-e-woodblock"),
            caption: "y el mundo se quedó sin sol por un minuto.",
            eclipseX: 960,
            eclipseY: 320,
            backdrop: "night",
          },
        },
        {
          name: "Page burn",
          preset: "pageBurn",
          opts: {
            image: IMG("impressionist-oil"),
            caption: "y así, sin más, la página cedió al fuego.",
            backdrop: "mono",
          },
        },
        {
          name: "Volcano",
          preset: "volcano",
          opts: {
            image: IMG("claymation-diorama"),
            sfx: "¡RUGE!",
            sfxColor: "#ff7a30",
            backdrop: "storm",
          },
        },
        {
          name: "Credits",
          preset: "credits",
          opts: {
            eyebrow: "Story Motion Kit",
            title: "GRACIAS",
            subtitle: "Escenas configurables · un solo parámetro: el tiempo",
            backdrop: "sunset",
          },
        },
      ];

      const TOTAL = ROSTER.length * DUR;
      const pad2 = (n) => String(n).padStart(2, "0");
      const total2 = pad2(ROSTER.length);

      // Persistent chrome
      kit.createSurfacePanel(root, {
        id: "shell",
        inset: 72,
        start: 0,
        duration: TOTAL,
        trackIndex: 1,
      });
      kit.createStampBadge(root, {
        id: "stamp",
        text: "Motion kit · Scene library",
        x: 110, y: 106, rotation: -2,
        start: 0.4, duration: TOTAL - 0.4,
        trackIndex: 2,
      });
      kit.createChapterMark(root, {
        id: "chapter",
        label: "Scene",
        value: `01 / ${total2}`,
        x: 1640, y: 102,
        start: 0.55, duration: TOTAL - 0.55,
        trackIndex: 3,
      });

      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#shell", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 0);
      tl.fromTo("#stamp", { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.6 }, 0.4);
      tl.fromTo("#chapter", { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.6 }, 0.55);

      // Render every scene from the roster
      ROSTER.forEach((entry, i) => {
        const at = i * DUR;
        const label = `${pad2(i + 1)} · ${entry.name}`;
        const fn = kit.scenes[entry.preset];
        if (!fn) {
          console.warn("Missing preset:", entry.preset);
          return;
        }
        fn(tl, root, Object.assign({ at, duration: DUR, label }, entry.opts));

        // Update chapter ticker at each scene start
        tl.call(
          () => {
            const el = document.querySelector("#chapter .story-chapter-value");
            if (el) el.textContent = `${pad2(i + 1)} / ${total2}`;
          },
          null,
          at,
        );
      });

      tl.to({}, { duration: 0.1 }, TOTAL - 0.1);

      window.__timelines = window.__timelines || {};
      window.__timelines[compositionId] = tl;
    </script>
  </body>
</html>

    />
    <style>
      :root {

      }

      * {

  <body>
    <div
      id="root"
      class="story-stage"
      data-composition-id="studio-preview"
      data-start="0"
      data-width="1920"
      data-height="1080"
    ></div>

    <script src="/hyperframes/story-motion-kit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hyperframes/core/dist/hyperframe.runtime.iife.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const root = document.getElementById("root");
      const compositionId = root.dataset.compositionId || "studio-preview";
      const kit = window.storyMotionKit;

      kit.ensureStyles();

      // 14 beats × ~5s → ~70s
      const DUR = 5;
      const makeBeats = (names) => {
        const out = {};
        names.forEach((name, i) => {
          out[name] = { start: i * DUR, end: (i + 1) * DUR };
        });
        return out;
      };
      const BEATS = makeBeats([
        "intro",        // 01 title + countdown
        "fullBleed",    // 02 ken burns + halftone
        "dialogue",     // 03 two photos + speech bubbles (rain bg)
        "scream",       // 04 scream shake + radial burst
        "heartbeat",    // 05 heartbeat + vignette (sunset bg)
        "zoom",         // 06 zoom punch + speed lines (cyber bg)
        "split",        // 07 split screen + ink slash
        "thought",      // 08 thought bubble + paper grid bg
        "glitch",       // 09 glitch + scanlines (mono bg)
        "typewriter",   // 10 typewriter + grid paper
        "comic",        // 11 3-panel comic grid
        "ticker",       // 12 news ticker + ribbon
        "montage",      // 13 float/swing montage
        "credits",      // 14 credits + fade
      ]);
      const TOTAL = BEATS.credits.end;

      const IMG = (slug) => `/assets/images/style-presets-v2.5/${slug}.png`;

      // --- Persistent chrome ---
      kit.createSurfacePanel(root, {
        id: "shell",
        inset: 72,
        start: 0,
        duration: TOTAL,
        trackIndex: 1,
      });

        id: "cr-card",
        eyebrow: "Chapter 01",
        title: "To be continued",
        subtitle: "01 of 04",
        x: 360,
        y: 320,
        width: 1200,
        height: 440,
        start: BEATS.credits.start + 0.2,
        duration: BEATS.credits.end - BEATS.credits.start - 0.2,
        trackIndex: 142,
      });
      kit.createLabelChip(root, {
        id: "cr-chip",
        text: "14 · Credits · Blur in",
        x: 146,
        y: 170,
        start: BEATS.credits.start + 0.3,
        duration: BEATS.credits.end - BEATS.credits.start - 0.5,
        trackIndex: 143,
      });

      // ==============================================
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#shell", { opacity: 0, scale: 0.985, duration: 0.7, ease: "power2.out" }, 0);
      kit.animateReveal(tl, "#stamp", { at: 0.4, x: -14, duration: 0.5 });
      kit.animateReveal(tl, "#chapter", { at: 0.55, x: 22, duration: 0.5 });

      function updateChapter(at, value) {
        tl.call(() => {
          const node = document.querySelector("#chapter .story-chapter-value");
          if (node) node.textContent = value;
        }, null, at);
      }

      // ---------- Beat 01
      tl.fromTo("#b1-bg", { opacity: 0 }, { opacity: 1, duration: 0.5 }, BEATS.intro.start);
      tl.fromTo("#b1-halftone", { opacity: 0 }, { opacity: 0.14, duration: 0.6 }, BEATS.intro.start + 0.1);
      kit.animateSpin(tl, "#intro-card", { at: BEATS.intro.start + 0.2, from: -4, duration: 0.9 });
      kit.animateReveal(tl, "#b1-chip", { at: BEATS.intro.start + 0.3, x: -16, duration: 0.5 });
      // Countdown numbers 3→2→1
      tl.call(() => {
        const el = document.querySelector("#intro-count");
        if (el) el.textContent = "3";
      }, null, BEATS.intro.start + 3.2);
      kit.animateBounceIn(tl, "#intro-count", { at: BEATS.intro.start + 3.2, duration: 0.4 });
      tl.call(() => {
        const el = document.querySelector("#intro-count");
        if (el) el.textContent = "2";
      }, null, BEATS.intro.start + 3.75);
      tl.fromTo("#intro-count", { scale: 1.3, opacity: 0.4 }, { scale: 1, opacity: 1, duration: 0.3, ease: "power3.out" }, BEATS.intro.start + 3.75);
      tl.call(() => {
        const el = document.querySelector("#intro-count");
        if (el) el.textContent = "1";
      }, null, BEATS.intro.start + 4.2);
      tl.fromTo("#intro-count", { scale: 1.3, opacity: 0.4 }, { scale: 1, opacity: 1, duration: 0.3, ease: "power3.out" }, BEATS.intro.start + 4.2);
      kit.animateFadeOut(tl, ["#intro-card", "#intro-count", "#b1-chip", "#b1-bg", "#b1-halftone"], { at: BEATS.intro.end - 0.3, duration: 0.3 });

      // ---------- Beat 02
      updateChapter(BEATS.fullBleed.start, "02 / 14");
      kit.animateWipeReveal(tl, "#fb-plate", { at: BEATS.fullBleed.start, direction: "left", duration: 0.9 });
      tl.fromTo("#fb-halftone", { opacity: 0 }, { opacity: 0.08, duration: 0.7 }, BEATS.fullBleed.start + 0.3);
      kit.animateKenBurns(tl, "#fb-plate", { at: BEATS.fullBleed.start + 0.9, duration: 4, fromScale: 1, toScale: 1.1, toX: -30, toY: -12 });
      kit.animateReveal(tl, "#fb-headline", { at: BEATS.fullBleed.start + 0.6, y: 40, duration: 0.8 });
      kit.animateReveal(tl, "#fb-caption", { at: BEATS.fullBleed.start + 1.2, y: 18, duration: 0.6 });
      kit.animateReveal(tl, "#fb-chip", { at: BEATS.fullBleed.start + 0.3, x: -16, duration: 0.5 });
      kit.animateFadeOut(tl, ["#fb-plate", "#fb-halftone", "#fb-headline", "#fb-caption", "#fb-chip"], { at: BEATS.fullBleed.end - 0.4, duration: 0.4 });

      // ---------- Beat 03
      updateChapter(BEATS.dialogue.start, "03 / 14");
      tl.fromTo("#d-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.dialogue.start);
      tl.fromTo("#d-rain", { opacity: 0 }, { opacity: 0.5, duration: 0.5 }, BEATS.dialogue.start + 0.2);
      // rain lines drift
      tl.to("#d-rain", { backgroundPositionY: "140px", duration: 4, ease: "none" }, BEATS.dialogue.start + 0.2);
      kit.animateSlideIn(tl, "#d-left", { at: BEATS.dialogue.start, from: "left", distance: 180, duration: 0.7 });
      kit.animateSlideIn(tl, "#d-right", { at: BEATS.dialogue.start + 0.3, from: "right", distance: 180, duration: 0.7 });
      kit.animateReveal(tl, "#d-chip", { at: BEATS.dialogue.start + 0.3, x: -16, duration: 0.5 });
      kit.animateBounceIn(tl, "#d-bubble-1", { at: BEATS.dialogue.start + 1.1, from: 24, duration: 0.5 });
      kit.animateFadeOut(tl, "#d-bubble-1", { at: BEATS.dialogue.start + 3.2, duration: 0.3 });
      kit.animateBounceIn(tl, "#d-bubble-2", { at: BEATS.dialogue.start + 3.35, from: 24, duration: 0.5 });
      tl.to("#d-left", { y: -8, duration: 2.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, BEATS.dialogue.start + 0.8);
      tl.to("#d-right", { y: 8, duration: 2.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, BEATS.dialogue.start + 0.8);
      kit.animateFadeOut(tl, ["#d-left", "#d-right", "#d-bubble-2", "#d-chip", "#d-bg", "#d-rain"], { at: BEATS.dialogue.end - 0.4, duration: 0.4 });

      // ---------- Beat 04
      updateChapter(BEATS.scream.start, "04 / 14");
      tl.fromTo("#sc-bg", { opacity: 0 }, { opacity: 1, duration: 0.3 }, BEATS.scream.start);
      kit.animateReveal(tl, "#sc-photo", { at: BEATS.scream.start, scale: 1.08, duration: 0.6 });
      kit.animateReveal(tl, "#sc-chip", { at: BEATS.scream.start + 0.3, x: -16, duration: 0.5 });
      kit.animateSpin(tl, "#sc-shout", { at: BEATS.scream.start + 0.7, from: -12, duration: 0.45 });
      kit.animateBurstExpand(tl, "#sc-burst", { at: BEATS.scream.start + 1.1, scale: 1.1, duration: 0.4, fade: false });
      kit.animateScreamShake(tl, "#sc-photo", { at: BEATS.scream.start + 1.1, amplitude: 16, duration: 0.7 });
      kit.animateScreamShake(tl, "#sc-shout", { at: BEATS.scream.start + 1.1, amplitude: 10, duration: 0.7 });
      kit.animateReveal(tl, "#sc-sfx", { at: BEATS.scream.start + 1.3, scale: 0.4, duration: 0.3, ease: "back.out(2.4)" });
      kit.animateShake(tl, "#sc-sfx", { at: BEATS.scream.start + 1.65, amplitude: 12, duration: 0.06, repeat: 5 });
      kit.animateFadeOut(tl, ["#sc-photo", "#sc-shout", "#sc-sfx", "#sc-chip", "#sc-bg", "#sc-burst"], { at: BEATS.scream.end - 0.4, duration: 0.4 });

      // ---------- Beat 05
      updateChapter(BEATS.heartbeat.start, "05 / 14");
      tl.fromTo("#hb-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.heartbeat.start);
      tl.fromTo("#hb-vig", { opacity: 0 }, { opacity: 1, duration: 0.6 }, BEATS.heartbeat.start + 0.2);
      kit.animateBlurIn(tl, "#hb-photo", { at: BEATS.heartbeat.start, duration: 0.7 });
      kit.animateReveal(tl, "#hb-chip", { at: BEATS.heartbeat.start + 0.3, x: -16, duration: 0.5 });
      kit.animateSpin(tl, "#hb-narr", { at: BEATS.heartbeat.start + 0.9, from: -3, duration: 0.5 });
      kit.animateHeartbeat(tl, "#hb-photo", { at: BEATS.heartbeat.start + 1.4, scale: 1.06 });
      kit.animateHeartbeat(tl, "#hb-photo", { at: BEATS.heartbeat.start + 2.6, scale: 1.07 });
      kit.animateHeartbeat(tl, "#hb-photo", { at: BEATS.heartbeat.start + 3.7, scale: 1.05 });
      kit.animateFadeOut(tl, ["#hb-photo", "#hb-narr", "#hb-chip", "#hb-bg", "#hb-vig"], { at: BEATS.heartbeat.end - 0.4, duration: 0.4 });

      // ---------- Beat 06
      updateChapter(BEATS.zoom.start, "06 / 14");
      tl.fromTo("#zp-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.zoom.start);
      kit.animateReveal(tl, "#zp-photo", { at: BEATS.zoom.start, scale: 0.85, duration: 0.6 });
      kit.animateReveal(tl, "#zp-chip", { at: BEATS.zoom.start + 0.3, x: -16, duration: 0.5 });
      // speed lines fly in & rotate
      tl.fromTo("#zp-speed", { opacity: 0, scale: 0.6 }, { opacity: 0.8, scale: 1, duration: 0.4, ease: "power2.out" }, BEATS.zoom.start + 0.6);
      tl.to("#zp-speed", { rotation: 24, duration: 2.4, ease: "none" }, BEATS.zoom.start + 0.6);
      kit.animateZoomPunch(tl, "#zp-photo", { at: BEATS.zoom.start + 1.2, scale: 1.22 });
      kit.animateColorFlash(tl, "#zp-photo", { at: BEATS.zoom.start + 1.2, color: "rgba(159,231,255,0.6)" });
      kit.animateBounceIn(tl, "#zp-sfx", { at: BEATS.zoom.start + 1.3, from: 40, duration: 0.5 });
      kit.animateVibrate(tl, "#zp-sfx", { at: BEATS.zoom.start + 1.8, amplitude: 3, repeat: 18 });
      kit.animateZoomPunch(tl, "#zp-photo", { at: BEATS.zoom.start + 2.8, scale: 1.15 });
      kit.animateFadeOut(tl, ["#zp-photo", "#zp-speed", "#zp-sfx", "#zp-chip", "#zp-bg"], { at: BEATS.zoom.end - 0.4, duration: 0.4 });

      // ---------- Beat 07
      updateChapter(BEATS.split.start, "07 / 14");
      kit.animateWipeReveal(tl, "#sp-a", { at: BEATS.split.start, direction: "left", duration: 0.8 });
      kit.animateWipeReveal(tl, "#sp-b", { at: BEATS.split.start + 0.35, direction: "right", duration: 0.8 });
      kit.animateReveal(tl, "#sp-chip", { at: BEATS.split.start + 0.3, x: -16, duration: 0.5 });
      tl.fromTo("#sp-slash", { opacity: 0, scale: 0.6 }, { opacity: 0.35, scale: 1, duration: 0.3, ease: "power3.out" }, BEATS.split.start + 0.6);
      kit.animateKenBurns(tl, "#sp-a", { at: BEATS.split.start + 1, duration: 3.4, fromScale: 1, toScale: 1.08, toX: 14 });
      kit.animateKenBurns(tl, "#sp-b", { at: BEATS.split.start + 1, duration: 3.4, fromScale: 1, toScale: 1.08, toX: -14 });
      kit.animateColorFlash(tl, "#sp-b", { at: BEATS.split.start + 2.8, color: "rgba(255,211,106,0.55)" });
      kit.animateFadeOut(tl, ["#sp-a", "#sp-b", "#sp-slash", "#sp-chip"], { at: BEATS.split.end - 0.4, duration: 0.4 });

      // ---------- Beat 08
      updateChapter(BEATS.thought.start, "08 / 14");
      tl.fromTo("#tb-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.thought.start);
      tl.fromTo("#tb-grid", { opacity: 0 }, { opacity: 1, duration: 0.5 }, BEATS.thought.start + 0.1);
      kit.animateSlideIn(tl, "#tb-photo", { at: BEATS.thought.start, from: "left", distance: 160, duration: 0.7 });
      kit.animateReveal(tl, "#tb-chip", { at: BEATS.thought.start + 0.3, x: -16, duration: 0.5 });
      kit.animateBounceIn(tl, "#tb-bubble", { at: BEATS.thought.start + 0.9, from: 30, duration: 0.6 });
      kit.animateFloat(tl, "#tb-bubble", { at: BEATS.thought.start + 1.6, y: -10, duration: 1.4, repeat: 1 });
      kit.animateSwing(tl, "#tb-photo", { at: BEATS.thought.start + 1.2, angle: 2, duration: 1.6 });
      kit.animateFadeOut(tl, ["#tb-photo", "#tb-bubble", "#tb-chip", "#tb-bg", "#tb-grid"], { at: BEATS.thought.end - 0.4, duration: 0.4 });

      // ---------- Beat 09
      updateChapter(BEATS.glitch.start, "09 / 14");
      tl.fromTo("#gl-bg", { opacity: 0 }, { opacity: 1, duration: 0.3 }, BEATS.glitch.start);
      kit.animateBlurIn(tl, "#gl-photo", { at: BEATS.glitch.start, duration: 0.6 });
      tl.fromTo("#gl-scan", { opacity: 0 }, { opacity: 0.4, duration: 0.4 }, BEATS.glitch.start + 0.2);
      tl.fromTo("#gl-grain", { opacity: 0 }, { opacity: 0.4, duration: 0.4 }, BEATS.glitch.start + 0.2);
      kit.animateReveal(tl, "#gl-chip", { at: BEATS.glitch.start + 0.3, x: -16, duration: 0.5 });
      kit.animateGlitch(tl, "#gl-photo", { at: BEATS.glitch.start + 1.1, amplitude: 14 });
      kit.animateGlitch(tl, "#gl-photo", { at: BEATS.glitch.start + 2.4, amplitude: 10 });
      kit.animateGlitch(tl, "#gl-photo", { at: BEATS.glitch.start + 3.3, amplitude: 16 });
      kit.animateBounceIn(tl, "#gl-sfx", { at: BEATS.glitch.start + 1.1, from: 20, duration: 0.4 });
      kit.animateFlicker(tl, "#gl-sfx", { at: BEATS.glitch.start + 1.6, min: 0.3, repeat: 6, duration: 0.08 });
      kit.animateFadeOut(tl, ["#gl-photo", "#gl-scan", "#gl-grain", "#gl-sfx", "#gl-chip", "#gl-bg"], { at: BEATS.glitch.end - 0.4, duration: 0.4 });

      // ---------- Beat 10
      updateChapter(BEATS.typewriter.start, "10 / 14");
      tl.fromTo("#tw-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.typewriter.start);
      tl.fromTo("#tw-grid", { opacity: 0 }, { opacity: 0.6, duration: 0.5 }, BEATS.typewriter.start + 0.1);
      kit.animateSlideIn(tl, "#tw-photo", { at: BEATS.typewriter.start, from: "left", distance: 140, duration: 0.7 });
      kit.animateReveal(tl, "#tw-chip", { at: BEATS.typewriter.start + 0.3, x: -16, duration: 0.5 });
      kit.animateTypewriter(tl, "#tw-text", { at: BEATS.typewriter.start + 0.8, duration: 3.4 });
      kit.animateFadeOut(tl, ["#tw-photo", "#tw-text", "#tw-chip", "#tw-bg", "#tw-grid"], { at: BEATS.typewriter.end - 0.4, duration: 0.4 });

      // ---------- Beat 11
      updateChapter(BEATS.comic.start, "11 / 14");
      tl.fromTo("#cm-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.comic.start);
      kit.animateCascade(tl, ["#cm-1", "#cm-2", "#cm-3"], { at: BEATS.comic.start, step: 0.18, y: 60, duration: 0.6 });
      kit.animateReveal(tl, "#cm-chip", { at: BEATS.comic.start + 0.3, x: -16, duration: 0.5 });
      kit.animateSwing(tl, "#cm-1", { at: BEATS.comic.start + 0.9, angle: 2, duration: 1.4 });
      kit.animateSwing(tl, "#cm-3", { at: BEATS.comic.start + 1, angle: 2, duration: 1.4 });
      kit.animateZoomPunch(tl, "#cm-2", { at: BEATS.comic.start + 1.3, scale: 1.08 });
      kit.animateBounceIn(tl, "#cm-sfx", { at: BEATS.comic.start + 1.6, from: 40, duration: 0.5 });
      kit.animateShake(tl, "#cm-2", { at: BEATS.comic.start + 1.6, amplitude: 10, duration: 0.07, repeat: 5 });
      kit.animateFadeOut(tl, ["#cm-1", "#cm-2", "#cm-3", "#cm-sfx", "#cm-chip", "#cm-bg"], { at: BEATS.comic.end - 0.4, duration: 0.4 });

      // ---------- Beat 12
      updateChapter(BEATS.ticker.start, "12 / 14");
      tl.fromTo("#tk-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.ticker.start);
      tl.fromTo("#tk-scan", { opacity: 0 }, { opacity: 0.25, duration: 0.4 }, BEATS.ticker.start + 0.1);
      kit.animateBlurIn(tl, "#tk-photo", { at: BEATS.ticker.start, duration: 0.7 });
      kit.animateReveal(tl, "#tk-chip", { at: BEATS.ticker.start + 0.3, x: -16, duration: 0.5 });
      kit.animateBounceIn(tl, "#tk-ribbon", { at: BEATS.ticker.start + 0.3, from: -30, duration: 0.5 });
      kit.animateSwing(tl, "#tk-ribbon", { at: BEATS.ticker.start + 1, angle: 2, duration: 1.4 });
      kit.animateSlideIn(tl, "#tk-ticker", { at: BEATS.ticker.start + 0.4, from: "bottom", distance: 80, duration: 0.5 });
      kit.animateTickerScroll(tl, "#tk-ticker", { at: BEATS.ticker.start + 0.8, duration: 7 });
      kit.animateColorFlash(tl, "#tk-photo", { at: BEATS.ticker.start + 2.6, color: "rgba(255,91,122,0.5)" });
      kit.animateFadeOut(tl, ["#tk-photo", "#tk-ribbon", "#tk-ticker", "#tk-chip", "#tk-bg", "#tk-scan"], { at: BEATS.ticker.end - 0.4, duration: 0.4 });

      // ---------- Beat 13
      updateChapter(BEATS.montage.start, "13 / 14");
      tl.fromTo("#mn-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.montage.start);
      tl.fromTo("#mn-grain", { opacity: 0 }, { opacity: 0.3, duration: 0.5 }, BEATS.montage.start + 0.1);
      kit.animateCascade(tl, ["#mn-1", "#mn-2", "#mn-3"], { at: BEATS.montage.start, step: 0.2, y: 40, duration: 0.6 });
      kit.animateReveal(tl, "#mn-chip", { at: BEATS.montage.start + 0.3, x: -16, duration: 0.5 });
      kit.animateFloat(tl, "#mn-1", { at: BEATS.montage.start + 0.9, y: -18, duration: 1.6, repeat: 1 });
      kit.animateFloat(tl, "#mn-3", { at: BEATS.montage.start + 1.1, y: 14, duration: 1.6, repeat: 1 });
      kit.animateSwing(tl, "#mn-2", { at: BEATS.montage.start + 1, angle: 2, duration: 1.8 });
      kit.animateBounceIn(tl, "#mn-caption", { at: BEATS.montage.start + 1.2, from: 30, duration: 0.5 });
      kit.animateFadeOut(tl, ["#mn-1", "#mn-2", "#mn-3", "#mn-caption", "#mn-chip", "#mn-bg", "#mn-grain"], { at: BEATS.montage.end - 0.4, duration: 0.4 });

      // ---------- Beat 14
      updateChapter(BEATS.credits.start, "14 / 14");
      tl.fromTo("#cr-bg", { opacity: 0 }, { opacity: 1, duration: 0.4 }, BEATS.credits.start);
      tl.fromTo("#cr-vig", { opacity: 0 }, { opacity: 1, duration: 0.6 }, BEATS.credits.start + 0.1);
      kit.animateBlurIn(tl, "#cr-card", { at: BEATS.credits.start + 0.2, duration: 0.9 });
      kit.animateReveal(tl, "#cr-chip", { at: BEATS.credits.start + 0.3, x: -16, duration: 0.5 });
      kit.animateFloat(tl, "#cr-card", { at: BEATS.credits.start + 1.2, y: -8, duration: 1.6, repeat: 1 });

      tl.to({}, { duration: 0.1 }, TOTAL - 0.1);

      window.__timelines[compositionId] = tl;
    </script>
  </body>
</html>
